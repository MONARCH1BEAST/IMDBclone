<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("theme");
          if (!/^(light|dark|auto)$/.test(t || "")) t = "auto";
          var d =
            t === "dark" ||
            (t === "auto" &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var r = document.documentElement;
          r.classList.toggle("dark", d);
          r.dataset.theme = d ? "dark" : "light";
          r.dataset.themeMode = t;
          r.style.colorScheme = d ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://image.tmdb.org https://images.unsplash.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' http://localhost:* ws://localhost:* https://api.themoviedb.org https://www.omdbapi.com https://*.upstash.io; media-src 'self';"
    />
    <meta name="description" content="Browse movies, actors, reviews, and watchlists." />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>IMDB Clone</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
